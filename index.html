<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        /* Background Image Container */
        .bg-image {
            /* URL gambar dihapus dari sini karena akan diisi oleh JavaScript */
            background-color: #000; /* Warna dasar jika gambar lambat loading */
            background-size: cover;
            background-position: center;
            height: 100%;
            width: 100%;
            filter: blur(15px); /* Efek Blur */
            -webkit-filter: blur(15px);
            transform: scale(1.1);
            position: absolute;
            z-index: 1;
            transition: background-image 0.5s ease-in-out; /* Supaya munculnya halus */
        }

        /* Overlay Hitam Transparan */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
        }

        /* Tombol Play Besar */
        .play-btn {
            width: 90px;
            height: 90px;
            background-color: rgba(255, 71, 87, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7);
            animation: pulse-red 2s infinite;
            margin-bottom: 20px;
            text-decoration: none;
            position: relative;
        }

        /* Segitiga Play */
        .play-icon {
            width: 0; 
            height: 0; 
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 5px;
        }

        /* Teks Peringatan */
        h1 {
            font-size: 1.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }
        
        p {
            font-size: 0.9rem;
            color: #ddd;
            margin-bottom: 30px;
        }

        .warning-box {
            padding: 10px 20px;
            border-radius: 5px;
            border: 1px solid #ff4757;
            background: rgba(0,0,0,0.6);
        }

        /* Animasi Berdenyut */
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

    </style>
</head>
<body>

    <div class="bg-image" id="dynamic-bg"></div>

      'https://thumbs4.imagebam.com/f3/30/65/ME1AZTM5_t.jpg'
      
      ];


        // 2. Fungsi untuk memilih gambar secara acak
        function setRandomBackground() {
            // Mengambil elemen background
            const bgElement = document.getElementById('dynamic-bg');
            
            // Mengambil angka acak berdasarkan jumlah gambar
            const randomIndex = Math.floor(Math.random() * backgroundImages.length);
            
            // Mengganti background
            bgElement.style.backgroundImage = `url('${backgroundImages[randomIndex]}')`;
        }

        // 3. Jalankan fungsi saat halaman selesai dimuat
        window.onload = setRandomBackground;
